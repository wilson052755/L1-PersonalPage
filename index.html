<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu-Shen Lin | Personal Webpage</title>
    <!-- Modern typography inspired by theatrical / premium designs -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-wrapper">
        <div class="stars"></div>
        <div class="ambient-light"></div>
    </div>
    
    <main class="content">
        <h1 class="name">Yu-Shen Lin</h1>
        <div class="divider"></div>
        <div class="info-group">
            <div class="clock-container">
                <span class="label">CURRENT REGIONAL TIME &mdash; UTC+8</span>
                <div id="clock" class="time">--:--:--</div>
                <div id="date" class="date">-- --- ----</div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
